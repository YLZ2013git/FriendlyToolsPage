name: 从个人仓库同步（带冲突检测与Issue通知）

on:
  schedule:
    # 每天 UTC 时间 0:00（北京时间早上 8:00）运行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # ============================================================
      # Step 1: 配置 Git 用户信息
      # ============================================================
      - name: 配置 Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # ============================================================
      # Step 2: 克隆组织仓库（目标）
      # ============================================================
      - name: 克隆组织仓库
        run: |
          git clone https://${{ secrets.PERSONAL_TOKEN }}@github.com/TengYve-Technology/FriendlyToolsPage-org.git target

      # ============================================================
      # Step 3: 克隆个人仓库（源）
      # ============================================================
      - name: 克隆个人仓库
        run: |
          git clone https://${{ secrets.PERSONAL_TOKEN }}@github.com/YLZ2013git/FriendlyToolsPage.git source

      # ============================================================
      # Step 4: 检查组织仓库是否有新提交（自上次同步以来）
      # ============================================================
      - name: 检查组织仓库是否有新提交
        id: check_changes
        run: |
          cd target

          # 获取当前组织仓库的 HEAD commit SHA
          TARGET_HEAD=$(git rev-parse HEAD)

          # 获取源仓库的 HEAD commit SHA
          cd ../source
          SOURCE_HEAD=$(git rev-parse HEAD)

          # 如果两个 HEAD 相同，说明没有新提交，跳过检测
          if [ "$TARGET_HEAD" == "$SOURCE_HEAD" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "两个仓库 HEAD 相同，无新提交"
            exit 0
          fi

          # 检查组织仓库是否有非合并提交（即有人直接 push 了代码）
          cd ../target
          # 获取从上次同步到现在的所有提交（排除合并提交）
          NEW_COMMITS=$(git log --oneline origin/main..HEAD --no-merges 2>/dev/null || echo "")

          if [ -n "$NEW_COMMITS" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            # 将新提交列表保存到输出，用于后续 Issue 创建
            echo "new_commits<<EOF" >> $GITHUB_OUTPUT
            echo "$NEW_COMMITS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "检测到新提交，数量：$(echo "$NEW_COMMITS" | wc -l)"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "未检测到新提交"
          fi

      # ============================================================
      # Step 5: 如果有新提交，创建 Issue 通知
      # ============================================================
      - name: 创建冲突通知 Issue
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PERSONAL_TOKEN }}
          script: |
            const newCommits = `${{ steps.check_changes.outputs.new_commits }}`;
            const now = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });

            const issueBody = `
            ## ⚠️ 同步冲突检测报告

            组织仓库 **FriendlyToolsPage-org** 在本次同步周期内检测到了新的提交，与个人仓库 **FriendlyToolsPage** 的代码产生冲突风险。

            ---

            ### 📝 新提交记录（自上次同步以来）
            \`\`\`
            ${newCommits}
            \`\`\`

            ---

            ### 🔧 请选择处理方式

            1. **保留这些提交** → 请手动将组织仓库的变更合并到个人仓库中，然后关闭此 Issue
            2. **丢弃这些提交** → 请重置组织仓库到同步状态（联系管理员），然后关闭此 Issue

            ---

            ### 📅 检测信息
            - 检测时间：${now}
            - 触发方式：${{ github.event_name == 'schedule' && '定时任务' || '手动触发' }}

            ---

            *此 Issue 由 GitHub Actions 自动创建，关闭后将自动恢复同步流程。*
            `;

            const issue = await github.rest.issues.create({
              owner: 'TengYve-Technology',
              repo: 'FriendlyToolsPage-org',
              title: `[自动] ⚠️ 同步冲突 - ${new Date().toISOString().slice(0, 10)}`,
              body: issueBody,
              labels: ['sync-conflict', 'auto-generated', '需要人工处理']
            });

            console.log(`✅ Issue 已创建：${issue.data.html_url}`);

            // 在 Issue 中 @ 通知组织 Owner（替换成实际的 Owner 用户名）
            await github.rest.issues.createComment({
              owner: 'TengYve-Technology',
              repo: 'FriendlyToolsPage-org',
              issue_number: issue.data.number,
              body: `@TengYve-Technology/owners 请查看此冲突报告并处理 🙏`
            });

      # ============================================================
      # Step 6: 如果没有冲突，执行同步
      # ============================================================
      - name: 执行同步（无冲突）
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          cd source
          git remote set-url origin https://${{ secrets.PERSONAL_TOKEN }}@github.com/TengYve-Technology/FriendlyToolsPage-org.git
          git push --mirror origin
          echo "✅ 同步完成，无冲突"

      # ============================================================
      # Step 7: 同步成功后，关闭所有已解决的冲突 Issue（可选）
      # ============================================================
      - name: 同步成功后关闭旧冲突 Issue
        if: steps.check_changes.outputs.has_changes == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PERSONAL_TOKEN }}
          script: |
            // 查找所有打开的 sync-conflict Issue
            const issues = await github.rest.issues.listForRepo({
              owner: 'TengYve-Technology',
              repo: 'FriendlyToolsPage-org',
              labels: 'sync-conflict',
              state: 'open'
            });

            // 如果存在旧的冲突 Issue，添加评论提示但保留不关闭
            // （让 Owner 手动关闭，保持人工决策）
            if (issues.data.length > 0) {
              for (const issue of issues.data) {
                await github.rest.issues.createComment({
                  owner: 'TengYve-Technology',
                  repo: 'FriendlyToolsPage-org',
                  issue_number: issue.number,
                  body: `🔄 新的同步已成功完成（${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}）。\n\n如果此冲突已解决，请手动关闭此 Issue。`
                });
                console.log(`💬 已在 Issue #${issue.number} 中添加评论`);
              }
            }